# config/targets.yaml
targets:
  - site: apple_refurb
    type: stock
    interval_hours: 4
    url: "https://www.apple.com/shop/refurbished/airpods"
    enabled: true
    dry_run: false

  - site: apple_refurb
    type: stock
    interval_hours: 4
    url: "https://www.apple.com/kr/shop/refurbished/airpods"
    enabled: true
    dry_run: false

  - site: steam
    type: price
    interval_hours: 3
    currency: KRW
    enabled: true
    dry_run: false
    products:
      - app_id: "32360"
        name: "The Secret of Monkey Island: Special Edition"
        target_price: 5000
      - app_id: "6588"
        name: "Monkey Island Collection"
        target_price: 20000
      - app_id: "32310"
        name: "Indiana Jones and the Last Crusade"
        target_price: 5000

  - site: gog
    type: price
    interval_hours: 6
    enabled: true
    dry_run: true
    currency: USD
    products:
      - slug: "the_witcher_3_wild_hunt"
        name: "The Witcher 3: Wild Hunt"
        target_price: 9.99
      - slug: "cyberpunk_2077"
        name: "Cyberpunk 2077"
        target_price: 19.99

  - site: epic
    type: price
    interval_hours: 6
    currency: KRW
    enabled: false
    dry_run: true
    products: []  # 추후 추가

  - site: amazon
    type: price
    interval_hours: 12
    currency: KRW
    enabled: false
    dry_run: true
    products: []  # 추후 추가
