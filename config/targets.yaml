# config/targets.yaml
targets:
  - site: apple_refurb
    type: stock
    interval_hours: 4
    url: "https://www.apple.com/shop/refurbished/airpods"
    enabled: true
    dry_run: false

  - site: apple_refurb
    type: stock
    interval_hours: 4
    url: "https://www.apple.com/kr/shop/refurbished/airpods"
    enabled: true
    dry_run: false

  - site: steam
    type: price
    interval_hours: 3
    currency: KRW
    enabled: true
    dry_run: false
    products:
      - app_id: "32360"
        name: "The Secret of Monkey Island: Special Edition"
        target_price: 5000
      - app_id: "6588"
        name: "Monkey Island Collection"
        target_price: 20000
      - app_id: "32310"
        name: "Indiana Jones and the Last Crusade"
        target_price: 5000
      - app_id: "2102"
        name: "LucasArts Adventure Pack"
        target_price: 10000

  - site: gog
    type: price
    interval_hours: 6
    enabled: true
    dry_run: true
    currency: USD
    products:
      - slug: "the_secret_of_monkey_island_special_edition"
        name: "The Secret of Monkey Island: Special Edition"
        target_price: 6.99
      - slug: "kings_quest_1_2_3"
        name: "Kings Quest 1-3"
        target_price: 8.99

  - site: epic
    type: price
    interval_hours: 6
    currency: KRW
    enabled: false
    dry_run: true
    products: []  # 추후 추가

  - site: amazon
    type: price
    interval_hours: 12
    currency: KRW
    enabled: false
    dry_run: true
    products: []  # 추후 추가
